<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffe6eb;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            color: #d11a43;
            text-align: center;
            overflow: hidden;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        .heart-qr {
            width: 200px;
            height: 200px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ff4d6d;
            border-radius: 50% 50% 0 0;
            transform: rotate(-45deg);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .heart-qr::before, .heart-qr::after {
            content: "";
            width: 200px;
            height: 200px;
            background: #ff4d6d;
            border-radius: 50%;
            position: absolute;
        }
        .heart-qr::before {
            top: -100px;
            left: 0;
        }
        .heart-qr::after {
            top: 0;
            left: 100px;
        }
        .qr-placeholder {
            transform: rotate(45deg);
            color: white;
            z-index: 10;
            font-weight: bold;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <h1>Happy Birthday!</h1>

    <div class="heart-qr">
        <div class="qr-placeholder">QR Code</div>
    </div>

    <audio autoplay loop>
        <source src="Teri Ore.mp3" type="audio/mp3">
        Your browser does not support the audio element.
    </audio>

</body>
</html>
